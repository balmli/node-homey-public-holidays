name: Update and publish holidays

on:
  schedule:
    - cron: '17 4 1 * *'
  workflow_dispatch:

concurrency:
  group: update-and-publish-holidays
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  update-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            scripts/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix scripts --registry=https://registry.npmjs.org

      - name: Update holiday source and generate data
        run: |
          npm install --prefix scripts --save date-holidays@latest --registry=https://registry.npmjs.org
          npm run generate

      - name: Detect generated changes
        id: changes
        run: |
          if git diff --quiet -- lib/holidays_list.ts scripts/package.json scripts/package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        run: npm version patch --no-git-tag-version

      - name: Configure GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@balmli'

      - name: Check whether this version needs publishing
        id: package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          if npm view "$package_name@$package_version" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Test package
        if: steps.changes.outputs.changed == 'true' || steps.package.outputs.publish == 'true'
        run: npm test

      - name: Commit and push generated changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/holidays_list.ts scripts/package.json scripts/package-lock.json package.json package-lock.json
          git commit -m "chore: update holiday data"
          git push origin HEAD:main

      - name: Publish to GitHub Packages
        if: steps.package.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
